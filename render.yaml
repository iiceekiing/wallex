services:
  - type: web
    name: wallex-api
    env: node
    plan: free
    buildCommand: "npm ci --only=production"
    startCommand: "npm start"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wallex-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_SECURE
        value: "false"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        value: Wallex <noreply@wallex.com>
      - key: OTP_EXPIRY_MINUTES
        value: "5"

databases:
  - name: wallex-db
    databaseName: wallex
    user: wallex_user
    plan: free
